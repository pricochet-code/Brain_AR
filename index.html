<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerveau RA - Légendes</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-text value="Noyau Caude (tete)" color="white" align="center" width="2" position="-0.3 0.4 0"
                font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
        <a-entity line="start: -0.15 0.25 0; end: -0.3 0.35 0; color: #FFF"></a-entity>

        <a-text value="Putamen" color="white" align="center" width="2" position="0.5 0.3 0"
                font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
        <a-entity line="start: 0.3 0.2 0; end: 0.5 0.25 0; color: #FFF"></a-entity>

        <a-text value="Pallidum" color="white" align="center" width="2" position="0.5 0.1 0"
                font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
        <a-entity line="start: 0.2 0.05 0; end: 0.5 0.05 0; color: #FFF"></a-entity>

        <a-text value="Thalamus" color="white" align="center" width="2" position="0.5 -0.1 0"
                font="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-text>
        <a-entity line="start: 0.1 -0.05 0; end: 0.5 -0.15 0; color: #FFF"></a-entity>
        
      </a-entity>
    </a-scene>
  </body>
</html>
